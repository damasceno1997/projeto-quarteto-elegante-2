<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site de Conversões Online - Unidades</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-container">
        <a href="index.html" class="nav-link active">1. Unidades (cm para m)</a>
        <a href="segundapg.html" class="nav-link">2. Temperatura (K para C)</a>
        <a href="terceirapg.html" class="nav-link">3. Moedas (Dólar para Real)</a>
        <a href="quartapg.html" class="nav-link">4. Tempo (min para s)</a>
    </nav>

    <main class="container">
        <h1>Conversão de Unidades</h1>
        <p class="subtitle">Centímetros para Metros</p>
        
        <div class="input-group">
            <label for="cmInput">Valor em Centímetros (cm):</label>
            <input type="number" id="cmInput" placeholder="Ex: 150" step="any">
        </div>

        <button id="btnConverter">Converter para Metros</button>

        <div class="result-box" id="resultBox">
            <p>Resultado: <span id="resultadoText">0</span> m</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
